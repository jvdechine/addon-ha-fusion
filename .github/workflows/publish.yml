name: "Publish"

on:
  workflow_dispatch:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  init:
    name: Initialize build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from config.yaml
        id: version
        run: |
          version=$(grep '^version:' config.yaml | awk '{print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          matrix='{"include":[]}'
          for entry in "amd64:ubuntu-24.04" "aarch64:ubuntu-24.04-arm"; do
            arch="${entry%%:*}"
            os="${entry##*:}"
            image="joaovictordechine/addon-ha-fusion-${arch}"
            build_from="ghcr.io/home-assistant/${arch}-base:latest"
            matrix=$(echo "$matrix" | jq -c \
              --arg arch "$arch" --arg os "$os" \
              --arg image "$image" --arg build_from "$build_from" \
              '.include += [{arch: $arch, os: $os, image: $image, build_from: $build_from}]')
          done
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          container-registry: docker.io
          container-registry-username: ${{ secrets.DOCKER_USERNAME }}
          container-registry-password: ${{ secrets.DOCKER_PASSWORD }}
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.init.outputs.version }}
            latest
          push: "true"
          version: ${{ needs.init.outputs.version }}
          cosign: "false"
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            VERSION=${{ needs.init.outputs.version }}
          labels: |
            io.hass.type=addon
